<!DOCTYPE html>
<html>

<head>

<title>District Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.topbar{
background:#2c7be5;
color:white;
padding:15px;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,250px);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
text-align:center;
}

.card a{
text-decoration:none;
color:#2c7be5;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topbar">

District Monitoring Dashboard

</div>

<div class="container">

<h2 id="districtName"></h2>

<div class="grid">

<div class="card"><a href="otp-dashboard.html?otp=OTP1">OTP 1</a></div>
<div class="card"><a href="otp-dashboard.html?otp=OTP2">OTP 2</a></div>
<div class="card"><a href="otp-dashboard.html?otp=OTP3">OTP 3</a></div>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search)

document.getElementById("districtName").innerText=params.get("district")

</script>

</body>
</html>
