<!DOCTYPE html>
<html>
<head>

<title>OTP Monitoring Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:350px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<h2>OTP Monitoring System</h2>

<input id="email" placeholder="Username"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyCB_O-ZucL6efwcMXGNOgTmZwccASrFuZI",
authDomain: "otp-dashboard-3c17e.firebaseapp.com",
projectId: "otp-dashboard-3c17e",
storageBucket: "otp-dashboard-3c17e.appspot.com",
messagingSenderId: "353305433217",
appId: "1:353305433217:web:bcebc8860babaa5e48a980"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


window.login = async function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

const userCredential=
await signInWithEmailAndPassword(auth,email,password);

const uid=userCredential.user.uid;


// ADMIN BYPASS

if(email==="admin@otpajk.com"){

window.location.href="admin-dashboard.html";

return;

}


const docRef=doc(db,"users",uid);

const docSnap=await getDoc(docRef);


if(docSnap.exists()){

const data=docSnap.data();

window.location.href=data.dashboard;

}else{

alert("No dashboard assigned. Contact admin.");

}


}catch(error){

alert(error.message);

}

};

</script>

</body>
</html>
