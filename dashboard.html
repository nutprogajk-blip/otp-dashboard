<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; margin:0; background:#f0f2f5; }
    .top-bar { background:#2c3e50; color:white; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
    .top-bar button { background:#34495e; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; margin-left:5px; }
    .top-bar button:hover { background:#1f2a36; }
    .content { padding:20px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>Dashboard - <span id="siteName"></span></div>
    <div>
      <button onclick="changePassword()">Change Password</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">
    <h1>Welcome!</h1>
    <p>Your OTP Dashboard is running successfully.</p>
  </div>

  <script>
    const API_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";
    const site = localStorage.getItem("site");
    if(!site) window.location.href="login.html";
    document.getElementById("siteName").textContent = site;

    function logout(){
      localStorage.removeItem("site");
      window.location.href="login.html";
    }

    function changePassword(){
      const newPass = prompt("Enter new password:");
      if(!newPass) return;
      fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({action:"updatePassword", site, newPassword:newPass})
      })
      .then(r=>r.json())
      .then(res=>{
        if(res.success) alert("Password updated!");
        else alert("Failed!");
      });
    }
  </script>
</body>
</html>
