<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .dashboard-container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      color: #555;
    }

    button {
      padding: 10px 20px;
      background-color: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #0f5bb5;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h2>Welcome to Dashboard</h2>
    <p id="userEmail"></p>
    <button id="logout">Logout</button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

    // ✅ Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCB_O-ZucL6efwcMXGNOgTmZwccASrFuZI",
      authDomain: "otp-dashboard-3c17e.firebaseapp.com",
      projectId: "otp-dashboard-3c17e",
      storageBucket: "otp-dashboard-3c17e.firebasestorage.app",
      messagingSenderId: "353305433217",
      appId: "1:353305433217:web:bcebc8860babaa5e48a980",
      measurementId: "G-M6JBKWBR7G"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const userEmail = document.getElementById('userEmail');
    const logoutBtn = document.getElementById('logout');

    // Check if user is logged in
    onAuthStateChanged(auth, user => {
      if (user) {
        userEmail.innerText = "Logged in as: " + user.email;
      } else {
        // Not logged in, redirect to login
        window.location.href = "login.html";
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });
  </script>
</body>
</html>
