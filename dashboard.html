<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.topbar{
background:#2c7be5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

button{
background:#e74c3c;
border:none;
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:4px;
}

</style>

</head>


<body>

<div class="topbar">

<div>OTP Dashboard</div>

<button id="logoutBtn">Logout</button>

</div>

<div style="padding:30px">

<h2>Welcome to OTP Monitoring System</h2>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyCB_O-ZucL6efwcMXGNOgTmZwccASrFuZI",
authDomain: "otp-dashboard-3c17e.firebaseapp.com",
projectId: "otp-dashboard-3c17e",
storageBucket: "otp-dashboard-3c17e.firebasestorage.app",
messagingSenderId: "353305433217",
appId: "1:353305433217:web:bcebc8860babaa5e48a980",
measurementId: "G-M6JBKWBR7G"

};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="index.html";

}

});


document.getElementById("logoutBtn").addEventListener("click",function(){

signOut(auth).then(()=>{

window.location.href="index.html";

});

});

</script>

</body>
</html>
